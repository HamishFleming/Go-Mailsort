mailbox: INBOX
rules:
    - name: linkedin
      from_contains:
        - linkedin.com
      subject_any:
        - is hiring
      body_any: []
      move_to: LinkedIn
      mark_as_read: false
    - name: github
      from_contains:
        - github.com
      subject_any:
        - GitHub
      body_any: []
      move_to: GitHub
      mark_as_read: true
